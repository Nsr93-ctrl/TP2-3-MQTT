version: '3.8'
services:
  mqtt-broker:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
      - "8883:8883"
      - "9001:9001"
    volumes:
      - /etc/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - /etc/mosquitto/conf.d:/mosquitto/config/conf.d:ro
      - /etc/mosquitto/passwd:/etc/mosquitto/passwd:ro
      - /etc/mosquitto/aclfile:/etc/mosquitto/aclfile:ro
      - /etc/mosquitto/server.crt:/etc/mosquitto/server.crt:ro
      - /etc/mosquitto/server.key:/etc/mosquitto/server.key:ro
      - mosquitto_data:/mosquitto/data
volumes:
  mosquitto_data:
